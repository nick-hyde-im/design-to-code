<!doctype html>
<html>
  <body
    style="
      font-family: sans-serif;
      padding: 16px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      box-sizing: border-box;
    "
  >
    <div
      id="history"
      style="
        flex: 1;
        overflow-y: auto;
        margin-bottom: 8px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      "
    ></div>

    <textarea
      id="prompt"
      placeholder="Optional: describe the component or request a change (e.g. 'make the corners more rounded')"
      style="
        width: 100%;
        height: 60px;
        box-sizing: border-box;
        margin-bottom: 8px;
        font-family: sans-serif;
      "
    ></textarea>
    <button id="generate" style="width: 100%; padding: 8px">Generate component</button>
    <p id="status" style="font-size: 12px; color: #666; margin: 4px 0 0"></p>

    <script>
      const statusEl = document.getElementById('status');
      const promptEl = document.getElementById('prompt');
      const historyEl = document.getElementById('history');

      function addBubble(role, text) {
        const bubble = document.createElement('div');
        bubble.textContent = text;
        bubble.style.padding = '6px 10px';
        bubble.style.borderRadius = '10px';
        bubble.style.fontSize = '12px';
        bubble.style.maxWidth = '85%';
        bubble.style.wordBreak = 'break-word';

        if (role === 'designer') {
          bubble.style.alignSelf = 'flex-end';
          bubble.style.background = '#0d99ff';
          bubble.style.color = '#fff';
        } else {
          bubble.style.alignSelf = 'flex-start';
          bubble.style.background = '#f0f0f0';
          bubble.style.color = '#333';
        }

        historyEl.appendChild(bubble);
        historyEl.scrollTop = historyEl.scrollHeight;
      }

      document.getElementById('generate').onclick = () => {
        const promptText = promptEl.value.trim();
        statusEl.textContent = 'Reading selection...';

        addBubble('designer', promptText || '(generate from design, no extra instructions)');
        promptEl.value = '';

        parent.postMessage({ pluginMessage: { type: 'generate', prompt: promptText } }, '*');
      };

      window.onmessage = async (event) => {
        const msg = event.data.pluginMessage;
        if (!msg) return;

        if (msg.type === 'error') {
          statusEl.textContent = msg.message;
          return;
        }

        if (msg.type === 'serialized') {
          statusEl.textContent = 'Sending to relay server...';
          try {
            const res = await fetch('http://localhost:4000/generate', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                componentName: msg.componentName,
                nodeTree: msg.nodeTree,
                imageBase64: msg.imageBase64,
                prompt: msg.prompt,
              }),
            });
            const data = await res.json();

            if (data.status === 'ok') {
              statusEl.textContent = `Generated ${data.componentName}`;
              addBubble(
                'assistant',
                data.isFollowUp ? 'Updated the component.' : `Generated ${data.componentName}.`
              );
            } else {
              statusEl.textContent = 'Generation failed';
              addBubble('assistant', 'Generation failed.');
            }
          } catch (err) {
            statusEl.textContent = 'Could not reach relay server';
            addBubble('assistant', 'Could not reach relay server.');
          }
        }
      };
    </script>
  </body>
</html>
